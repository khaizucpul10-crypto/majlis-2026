	<script>
	async function semakIC(){

    let ic = document.getElementById("icInput").value.trim();

    if(ic==""){
        alert("Sila masukkan No. IC");
        return;
    }

    try{

        let response = await fetch(API_URL + "?ic=" + encodeURIComponent(ic));

        let data = await response.json();

        if(data.status){

            localStorage.setItem("peserta", JSON.stringify(data));

            window.location.href="maklumat.html";

        }else{

            alert("❌ No. IC tidak dijumpai.");

        }

    }catch(err){

        alert("Tidak dapat berhubung dengan server.");

        console.log(err);

    }

}
	</script>

<!DOCTYPE html>

	<head>

	<style>
		body{
			margin:0;
			font-family:Segoe UI;
			background:#f4f6fb;
		}

		/* HEADER */
		.header{
			background:#1e3a8a;
			color:white;
			padding:15px;
			text-align:center;
			font-weight:bold;
		}

		/* CARD */
		.card{
			background:#fffce4;
			margin:20px;
			padding:20px;
			border-radius:15px;
			box-shadow:0 5px 15px rgba(0,0,0,0.1);
			text-align:center;
			font-family: "Century Gothic", CenturyGothic, AppleGothic, sans-serif;
		}

		/* PROFILE */
		.profile{
			width:80px;
			height:80px;
			border-radius:50%;
			background:#1e3a8a;
			margin:auto;
		}

		/* NAME */
		.name{
			font-size:20px;
			font-weight:bold;
			margin-top:10px;
		}

		.ic{
			background:#eef2ff;
			display:inline-block;
			padding:5px 12px;
			border-radius:20px;
			margin-top:5px;
		}

		/* INFO */
		.row{
			display:flex;
			justify-content:space-between;
			margin-top:15px;
			font-size:14px;
		}

		.big{
			font-size:28px;
			font-weight:bold;
			color:#16a34a;
		}

		/* BUTTON */
		.btn{
			width:100%;
			padding:15px;
			border:none;
			border-radius:10px;
			margin-top:15px;
			font-size:16px;
		}

		.green{
			background:#16a34a;
			color:white;
		}

		.gray{
			background:#e5e7eb;
		}
	</style>

</head>

// BUTTON
function sahHadir(){
    //alert("Kehadiran berjaya direkod!");
    //window.location.href="index.html";

    let ic = localStorage.getItem("ic");

    // ambil rekod kehadiran lama
    let hadirList = JSON.parse(localStorage.getItem("kehadiran")) || [];

    // check duplicate
    let dahHadir = hadirList.find(x => x.ic === ic);

    if(dahHadir){
        alert("❗ Tetamu ini sudah daftar pada " + dahHadir.masa);
        return;
    }

    // simpan kehadiran
    hadirList.push({
        ic: ic,
        masa: new Date().toLocaleString()
    });

    localStorage.setItem("kehadiran", JSON.stringify(hadirList));

    alert("✅ Kehadiran berjaya direkod!");
    window.location.href="index.html";
}

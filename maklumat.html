			padding:15px;

		}

		.card{

		}

		/* INFO */
		.row{

			justify-content:space-between;
			margin-top:15px;
			font-size:14px;
		}

		.big{
			font-size:28px;
			font-weight:bold;
			color:#16a34a;
		}

		/* BUTTON */
		.btn{
			width:100%;
			padding:15px;
			border:none;
			border-radius:10px;
			margin-top:15px;
			font-size:16px;
		}

		.green{
			background:#16a34a;
			color:white;
		}

		.gray{
			background:#e5e7eb;
		}
	</style>

</head>

// BUTTON
function sahHadir(){
    //alert("Kehadiran berjaya direkod!");
    //window.location.href="index.html";

    let ic = localStorage.getItem("ic");

    // ambil rekod kehadiran lama
    let hadirList = JSON.parse(localStorage.getItem("kehadiran")) || [];

    // check duplicate
    let dahHadir = hadirList.find(x => x.ic === ic);

    if(dahHadir){
        alert("❗ Tetamu ini sudah daftar pada " + dahHadir.masa);
        return;
    }

    // simpan kehadiran
    hadirList.push({
        ic: ic,
        masa: new Date().toLocaleString()
    });

    localStorage.setItem("kehadiran", JSON.stringify(hadirList));

    alert("✅ Kehadiran berjaya direkod!");
    window.location.href="index.html";
}
